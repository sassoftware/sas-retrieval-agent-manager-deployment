apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgrest.fullname" . }}-admin
  labels:
    {{- include "postgrest.labels" . | nindent 4 }}
spec:
  type: {{ .Values.db.rest.adminService.type }}
  ports:
    - port: {{ .Values.db.rest.adminService.port }}
      targetPort: admin
      protocol: TCP
      name: admin
    - port: {{ .Values.db.rest.monitoring.adminService.port }}
      targetPort: admin-monitor
      protocol: TCP
      name: admin-monitor
  selector:
    {{- include "postgrest.selectorLabels" . | nindent 4 }}
