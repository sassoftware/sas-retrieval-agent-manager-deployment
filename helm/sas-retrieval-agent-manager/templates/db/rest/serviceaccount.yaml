{{- if .Values.db.rest.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "postgrest.serviceAccountName" . }}
  labels:
    {{- include "postgrest.labels" . | nindent 4 }}
  {{- with .Values.db.rest.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.db.rest.serviceAccount.automount }}
{{- end }}
