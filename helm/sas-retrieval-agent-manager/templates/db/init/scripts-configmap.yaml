apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "db-initialization.fullname" . }}-scripts
  labels:
    {{- include "db-initialization.labels" . | nindent 4 }}
data:
{{- if  .Values.db.init.config.database.initializeDb }}
  initialize_database.sh: |-

    #!/bin/bash
    set -euo pipefail

    export PSQL=`which psql`

    USER_FILE="/secret/admin/user"
    PASSWORD_FILE="/secret/admin/password"
    SCRIPT_DIR="/scripts"
    
    DB_HOST=$(cat /config/db/host)
    DB_PORT=$(cat /config/db/port)
    DB_NAME="postgres"
    export INIT_DB_NAME="$DB_NAME"
    export DB_SSL_MODE=$(cat /config/db/sslmode)
    echo "Connecting to DB at $DB_HOST:$DB_PORT with SSL mode $DB_SSL_MODE"

    # Check if both files exist
    WAIT_TIME=0
    MAX_WAIT=300
    SLEEP_INTERVAL=1
    while true; do
      if [ -f "$USER_FILE" ] && [ -f "$PASSWORD_FILE" ]; then
        USER=$(cat "$USER_FILE")
        PASSWORD=$(cat "$PASSWORD_FILE")
        if [ -n "$USER" ] && [ -n "$PASSWORD" ]; then
          break
        fi
      fi
      if [ "$WAIT_TIME" -ge "$MAX_WAIT" ]; then
        echo "Credential files are missing or empty after waiting $MAX_WAIT seconds. Skipping script execution."
        touch /tmp/skip_cleanup
        exit 0
      fi
      if [ "$WAIT_TIME" -eq 0 ]; then
        echo "Waiting for credentials to appear..."
      fi
      sleep $SLEEP_INTERVAL
      WAIT_TIME=$((WAIT_TIME+SLEEP_INTERVAL))
    done

    # Define PostgreSQL connection parameters
    PGHOST="${DB_HOST}"
    PGPORT="${DB_PORT}"
    PGDATABASE="${PGDATABASE:-postgres}"

    # Check if credentials are not empty
    if [[ -n "$USER" && -n "$PASSWORD" ]]; then
      echo "Credentials found. Checking PostgreSQL readiness..."

      # Export password for pg_isready and scripts that follow
      export PGPASSWORD="$PASSWORD"

      # Wait for PostgreSQL to be ready (max 5min, poll every 5s)
      DB_WAIT_TIME=0
      DB_MAX_WAIT=300
      DB_SLEEP_INTERVAL=5
      while true; do
        if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$USER" -d "$PGDATABASE"; then
          echo "PostgreSQL is ready. Executing initialization scripts..."


          # Set environment variables for PostgreSQL connection and export for child scripts
          export PGUSER="$USER"
          export PGPASSWORD="$PASSWORD"
          export PGHOST="$DB_HOST"
          export PGPORT="$DB_PORT"
          export PGDATABASE="$DB_NAME"
          export PGSSLMODE="$DB_SSL_MODE"
          export DB_HOST
          export DB_PORT
          export DB_NAME
          export USER
          export PASSWORD
          export DB_SSL_MODE

          for script in "$SCRIPT_DIR"/*_initialization.sh; do
            if [[ -x "$script" ]]; then
              echo "Running $script..."
              "$script"
            else
              echo "Skipping $script (not executable)"
            fi
          done
          break
        fi
        if [ "$DB_WAIT_TIME" -ge "$DB_MAX_WAIT" ]; then
          echo "ERROR: PostgreSQL is not ready after waiting $DB_MAX_WAIT seconds. Failing initialization."
          exit 1
        fi
        if [ "$DB_WAIT_TIME" -eq 0 ]; then
          echo "Waiting for PostgreSQL to become ready..."
        fi
        sleep $DB_SLEEP_INTERVAL
        DB_WAIT_TIME=$((DB_WAIT_TIME+DB_SLEEP_INTERVAL))
      done
    else
      echo "Missing or empty credentials. Skipping script execution."
      touch /tmp/skip_cleanup
      exit 0
    fi

  application_initialization.sh: |-

    #!/bin/bash
    set -euo pipefail


    DB_NAME=$(cat /config/postgrest/db)
    DB_SCHEMA=$(cat /config/postgrest/schema)

    MANAGED_USER_FILE="/secret/postgrest/user"
    MANAGED_PASSWORD_FILE="/secret/postgrest/password"

    MANAGED_USER=$(cat "$MANAGED_USER_FILE")
    MANAGED_PASSWORD=$(cat "$MANAGED_PASSWORD_FILE")

    MIGRATION_USER_FILE="/secret/migration/user"
    MIGRATION_PASSWORD_FILE="/secret/migration/password"

    MIGRATION_USER=$(cat "$MIGRATION_USER_FILE")
    MIGRATION_PASSWORD=$(cat "$MIGRATION_PASSWORD_FILE")

    VJOB_USER_FILE="/secret/vectorizationjob/user"
    VJOB_PASSWORD_FILE="/secret/vectorizationjob/password"

    VJOB_USER=$(cat "$VJOB_USER_FILE")
    VJOB_PASSWORD=$(cat "$VJOB_PASSWORD_FILE")

    EMBEDDING_USER_FILE="/secret/embedding/user"
    EMBEDDING_PASSWORD_FILE="/secret/embedding/password"

    EMBEDDING_USER=$(cat "$EMBEDDING_USER_FILE")
    EMBEDDING_PASSWORD=$(cat "$EMBEDDING_PASSWORD_FILE")

    POSTGREST_ROLES_PATH="/config/application-roles"

    # Set environment variables for PostgreSQL connection

    {{- if .Values.db.init.config.application.createDB }}

    # Create the PostgREST app database if it does not exist (idempotent)
    echo "Checking if database '$DB_NAME' exists..."
    DB_EXISTS=$($PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -tAc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'")
    if [ "$DB_EXISTS" != "1" ]; then
      echo "Creating database '$DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -c "CREATE DATABASE \"$DB_NAME\";" || echo "Database '$DB_NAME' already exists or creation failed."
      echo "Database '$DB_NAME' created or already present."
    else
      echo "Database '$DB_NAME' already exists."
    fi

    {{- end }}
    {{- if .Values.db.init.config.application.createUser }}

    # Create the PostgREST user if it does not exist
    echo "Creating PostgREST user if it does not exist..."
    echo "Managed User: $MANAGED_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${MANAGED_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "PostgREST user '$MANAGED_USER' present."

    # Create the Migration user if it does not exist
    echo "Creating Migration user if it does not exist..."
    echo "Migration User: $MIGRATION_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${MIGRATION_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${MIGRATION_USER}', '${MIGRATION_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${MIGRATION_USER}', '${MIGRATION_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "Migration user '$MIGRATION_USER' present."

    # Create the Vectorization Job user if it does not exist
    echo "Creating Vectorization Job user if it does not exist..."
    echo "Vectorization Job User: $VJOB_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${VJOB_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${VJOB_USER}', '${VJOB_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${VJOB_USER}', '${VJOB_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "Vectorization Job user '$VJOB_USER' present."

    # Create the Embedding user if it does not exist
    echo "Creating Embedding user if it does not exist..."
    echo "Embedding User: $EMBEDDING_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${EMBEDDING_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${EMBEDDING_USER}', '${EMBEDDING_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${EMBEDDING_USER}', '${EMBEDDING_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "Embedding user '$EMBEDDING_USER' present."

    {{- end }}
    {{- if .Values.db.init.config.application.createSchema }}

    # Create the PostgREST schema if it does not exist
    echo "Checking if schema '$DB_SCHEMA' exists in database '$DB_NAME'..."
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -tAc "SELECT 1 FROM information_schema.schemata WHERE schema_name = '$DB_SCHEMA'" | grep -q 1; then
      echo "Creating schema '$DB_SCHEMA' in database '$DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "CREATE SCHEMA \"$DB_SCHEMA\";"
      echo "Schema '$DB_SCHEMA' created in database '$DB_NAME'."

      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS \"pgcrypto\" SCHEMA \"${DB_SCHEMA}\";"
    else
      echo "Schema '$DB_SCHEMA' already exists in database '$DB_NAME'."
    fi

    # Grant privileges to the managed user
    echo "Granting privileges to user '$MANAGED_USER' on schema '$DB_SCHEMA' in database '$DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT ALL ON SCHEMA \"$DB_SCHEMA\" TO \"${MANAGED_USER}\";"
    echo "User '$MANAGED_USER' granted privileges on schema '$DB_SCHEMA'."

    # Grant privileges to the Migration user
    echo "Granting privileges to user '$MIGRATION_USER' on schema '$DB_SCHEMA' in database '$DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT ALL ON SCHEMA \"$DB_SCHEMA\" TO \"${MIGRATION_USER}\";"
    echo "User '$MIGRATION_USER' granted privileges on schema '$DB_SCHEMA'."

    # Grant privileges to the Vectorization Job user
    echo "Granting privileges to user '$VJOB_USER' on schema '$DB_SCHEMA' in database '$DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT USAGE ON SCHEMA \"$DB_SCHEMA\" TO \"${VJOB_USER}\";"
    echo "User '$VJOB_USER' granted privileges on schema '$DB_SCHEMA'."

    # Grant privileges to the Embedding user
    echo "Granting privileges to user '$EMBEDDING_USER' on schema '$DB_SCHEMA' in database '$DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT USAGE ON SCHEMA \"$DB_SCHEMA\" TO \"${EMBEDDING_USER}\";"
    echo "User '$EMBEDDING_USER' granted privileges on schema '$DB_SCHEMA'."

    {{- end }}

    # Create and Grant the PostgREST roles if they do not exist
    echo "Processing PostgREST roles from directory: $POSTGREST_ROLES_PATH"
    for role_file in "$POSTGREST_ROLES_PATH"/*; do
      if [[ -f "$role_file" ]]; then
        ROLE_NAME=$(cat "$role_file")
        echo "Processing PostgREST role: $ROLE_NAME"

        # Create the role with NOLOGIN if it does not exist
        $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${ROLE_NAME}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I NOLOGIN',
              '${ROLE_NAME}'
          );
      END IF;
    END
    \$\$;
    EOF
        echo "Role '$ROLE_NAME' present."

        # Grant USAGE on the schema to the role
        echo "Granting USAGE on schema '$DB_SCHEMA' to role '$ROLE_NAME'..."
        $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT USAGE ON SCHEMA \"$DB_SCHEMA\" TO \"${ROLE_NAME}\";"
        echo "Role '$ROLE_NAME' granted USAGE on schema '$DB_SCHEMA'."

        # Allow impersonation: grant PostgREST user to the role
        echo "Granting role '$ROLE_NAME' to PostgREST user '$MANAGED_USER'..."
        $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT \"${ROLE_NAME}\" TO \"${MANAGED_USER}\";"
        echo "Role '$ROLE_NAME' granted to PostgREST user '$MANAGED_USER'."

        echo "Role '$ROLE_NAME' processed."
      fi
    done

    echo "PostgREST initialization completed."

  monitoring_initialization.sh: |-

    #!/bin/bash
    set -euo pipefail


    MONITORING_DB_NAME=$(cat /config/monitoring/db)
    MONITORING_DB_SCHEMA=$(cat /config/monitoring/schema)

    MANAGED_USER_FILE="/secret/monitoring/user"
    MANAGED_PASSWORD_FILE="/secret/monitoring/password"

    MANAGED_USER=$(cat "$MANAGED_USER_FILE")
    MANAGED_PASSWORD=$(cat "$MANAGED_PASSWORD_FILE")

    MIGRATION_USER_FILE="/secret/migration/user"
    MIGRATION_PASSWORD_FILE="/secret/migration/password"

    MIGRATION_USER=$(cat "$MIGRATION_USER_FILE")
    MIGRATION_PASSWORD=$(cat "$MIGRATION_PASSWORD_FILE")

    EMBEDDING_USER_FILE="/secret/embedding/user"
    EMBEDDING_PASSWORD_FILE="/secret/embedding/password"

    EMBEDDING_USER=$(cat "$EMBEDDING_USER_FILE")
    EMBEDDING_PASSWORD=$(cat "$EMBEDDING_PASSWORD_FILE")

    OTEL_USER_FILE="/secret/otel/user"
    OTEL_PASSWORD_FILE="/secret/otel/password"

    OTEL_USER=$(cat "$OTEL_USER_FILE")
    OTEL_PASSWORD=$(cat "$OTEL_PASSWORD_FILE")

    POSTGREST_ROLES_PATH="/config/monitoring-roles"

    # Set environment variables for PostgreSQL connection

    {{- if .Values.db.init.config.monitoring.createDB }}

    # Create the PostgREST monitoring database if it does not exist
    echo "Checking if database '$MONITORING_DB_NAME' exists..."
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -lqt | cut -d \| -f 1 | grep -qw "$MONITORING_DB_NAME"; then
      echo "Creating database '$MONITORING_DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -c "CREATE DATABASE \"$MONITORING_DB_NAME\";"
      echo "Database '$MONITORING_DB_NAME' created."
    else
      echo "Database '$MONITORING_DB_NAME' already exists."
    fi

    {{- end }}
    {{- if .Values.db.init.config.monitoring.createUser }}

    # Create the PostgREST Monitoring user if it does not exist
    echo "Creating PostgREST Monitoring user if it does not exist..."
    echo "Managed User: $MANAGED_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${MANAGED_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "PostgREST Monitoring user '$MANAGED_USER' present."

    # Create the Migration user if it does not exist
    echo "Creating Migration user if it does not exist..."
    echo "Migration User: $MIGRATION_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${MIGRATION_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${MIGRATION_USER}', '${MIGRATION_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${MIGRATION_USER}', '${MIGRATION_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "Migration user '$MIGRATION_USER' present."

    # Create the OTEL user if it does not exist
    echo "Creating OTEL user if it does not exist..."
    echo "OTEL User: $OTEL_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${OTEL_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${OTEL_USER}', '${OTEL_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${OTEL_USER}', '${OTEL_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "OTEL user '$OTEL_USER' present."

    {{- end }}
    {{- if .Values.db.init.config.monitoring.createSchema }}

    # Create the PostgREST monitoring schema if it does not exist
    echo "Checking if schema '$MONITORING_DB_SCHEMA' exists in database '$MONITORING_DB_NAME'..."
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -tAc "SELECT 1 FROM information_schema.schemata WHERE schema_name = '$MONITORING_DB_SCHEMA'" | grep -q 1; then
      echo "Creating schema '$MONITORING_DB_SCHEMA' in database '$MONITORING_DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "CREATE SCHEMA \"$MONITORING_DB_SCHEMA\";"
      echo "Schema '$MONITORING_DB_SCHEMA' created in database '$MONITORING_DB_NAME'."
      {{- if .Values.db.init.config.timescale.enabled }}
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS \"timescaledb\" SCHEMA \"${MONITORING_DB_SCHEMA}\";"
      {{- end }}
    else
      echo "Schema '$MONITORING_DB_SCHEMA' already exists in database '$MONITORING_DB_NAME'."
    fi

    # Grant privileges to the managed user
    echo "Granting privileges to user '$MANAGED_USER' on schema '$MONITORING_DB_SCHEMA' in database '$MONITORING_DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "GRANT ALL ON SCHEMA \"$MONITORING_DB_SCHEMA\" TO \"${MANAGED_USER}\";"
    echo "User '$MANAGED_USER' granted privileges on schema '$MONITORING_DB_SCHEMA'."

    # Grant privileges to the Migration user
    echo "Granting privileges to user '$MIGRATION_USER' on schema '$MONITORING_DB_SCHEMA' in database '$MONITORING_DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "GRANT ALL ON SCHEMA \"$MONITORING_DB_SCHEMA\" TO \"${MIGRATION_USER}\";"
    echo "User '$MIGRATION_USER' granted privileges on schema '$MONITORING_DB_SCHEMA'."

    # Grant privileges to the Embedding user
    echo "Granting privileges to user '$EMBEDDING_USER' on schema '$MONITORING_DB_SCHEMA' in database '$MONITORING_DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "GRANT USAGE ON SCHEMA \"$MONITORING_DB_SCHEMA\" TO \"${EMBEDDING_USER}\";"
    echo "User '$EMBEDDING_USER' granted privileges on schema '$MONITORING_DB_SCHEMA'."

    # Grant privileges to the OTEL user
    echo "Granting privileges to user '$OTEL_USER' on schema '$MONITORING_DB_SCHEMA' in database '$MONITORING_DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "GRANT USAGE ON SCHEMA \"$MONITORING_DB_SCHEMA\" TO \"${OTEL_USER}\";"
    echo "User '$OTEL_USER' granted privileges on schema '$MONITORING_DB_SCHEMA'."

    {{- end }}

    # Create and Grant the PostgREST roles for monitoring database
    echo "Processing PostgREST roles for monitoring database from directory: $POSTGREST_ROLES_PATH"

    for role_file in "$POSTGREST_ROLES_PATH"/*; do
      if [[ -f "$role_file" ]]; then
        ROLE_NAME=$(cat "$role_file")
        echo "Processing PostgREST role for monitoring: $ROLE_NAME"

        # Create the role with NOLOGIN if it does not exist
        $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${ROLE_NAME}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I NOLOGIN',
              '${ROLE_NAME}'
          );
      END IF;
    END
    \$\$;
    EOF
        echo "Role '$ROLE_NAME' present."

        # Grant USAGE on the monitoring schema to the role
        echo "Granting USAGE on schema '$MONITORING_DB_SCHEMA' to role '$ROLE_NAME'..."
        $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "GRANT USAGE ON SCHEMA \"$MONITORING_DB_SCHEMA\" TO \"${ROLE_NAME}\";"
        echo "Role '$ROLE_NAME' granted USAGE on schema '$MONITORING_DB_SCHEMA'."

        # Allow impersonation: grant PostgREST user to the role
        echo "Granting role '$ROLE_NAME' to PostgREST user '$MANAGED_USER'..."
        $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$MONITORING_DB_NAME" -c "GRANT \"${ROLE_NAME}\" TO \"${MANAGED_USER}\";"
        echo "Role '$ROLE_NAME' granted to PostgREST user '$MANAGED_USER'."

        echo "Role '$ROLE_NAME' processed for monitoring database."
      fi
    done

    echo "Monitoring database initialization completed."

  keycloak_initialization.sh: |-

    #!/bin/bash
    set -euo pipefail


    DB_NAME=$(cat /config/keycloak/db)
    DB_SCHEMA=$(cat /config/keycloak/schema)

    MANAGED_USER_FILE="/secret/keycloak/user"
    MANAGED_PASSWORD_FILE="/secret/keycloak/password"

    MANAGED_USER=$(cat "$MANAGED_USER_FILE")
    MANAGED_PASSWORD=$(cat "$MANAGED_PASSWORD_FILE")

    # Set environment variables for PostgreSQL connection
    {{- if .Values.db.init.config.keycloak.createDB }}

    # Create the keycloak database if it does not exist
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -lqt | cut -d \| -f 1 | grep -qw "$DB_NAME"; then
      echo "Creating database '$DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -c "CREATE DATABASE \"$DB_NAME\";"
      echo "Database '$DB_NAME' created."
    else
      echo "Database '$DB_NAME' already exists."
    fi
    {{- end }}
    {{- if .Values.db.init.config.keycloak.createUser }}

    # Create the keycloak user if it does not exist
    echo "Creating Keycloak user if it does not exist..."
    echo "Managed User: $MANAGED_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${MANAGED_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "Keycloak user '$MANAGED_USER' present."
    {{- end }}
    {{- if .Values.db.init.config.keycloak.createSchema }}

    # Create the keycloak schema if it does not exist
    echo "Checking if schema '$DB_SCHEMA' exists in database '$DB_NAME'..."
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -tAc "SELECT 1 FROM information_schema.schemata WHERE schema_name = '$DB_SCHEMA'" | grep -q 1; then
      echo "Creating schema '$DB_SCHEMA' in database '$DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "CREATE SCHEMA \"$DB_SCHEMA\";"
      echo "Schema '$DB_SCHEMA' created in database '$DB_NAME'."
    else
      echo "Schema '$DB_SCHEMA' already exists in database '$DB_NAME'."
    fi

    # Grant privileges to the managed user
    echo "Granting privileges to user '$MANAGED_USER' on schema '$DB_SCHEMA' in database '$DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT ALL ON SCHEMA \"$DB_SCHEMA\" TO \"${MANAGED_USER}\";"
    echo "User '$MANAGED_USER' granted privileges on schema '$DB_SCHEMA'."
    {{- end }}

    echo "Keycloak initialization completed."

  {{- if .Values.db.init.config.vectorStore.enabled }}
  vector_store_initialization.sh: |-

    #!/bin/bash


    DB_NAME=$(cat /config/vectorstore/db)
    DB_SCHEMA=$(cat /config/vectorstore/schema)

    MANAGED_USER_FILE="/secret/vectorstore/user"
    MANAGED_PASSWORD_FILE="/secret/vectorstore/password"

    MANAGED_USER=$(cat "$MANAGED_USER_FILE")
    MANAGED_PASSWORD=$(cat "$MANAGED_PASSWORD_FILE")

    # Define the PostgreSQL connection string
    DB_CONN="${BASE_DB_CONN}/${DB_NAME}?sslmode=${DB_SSL_MODE}"
    {{- if .Values.db.init.config.vectorStore.createDB }}

    # Create the vectorStore database if it does not exist
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -lqt | cut -d \| -f 1 | grep -qw "$DB_NAME"; then
      echo "Creating database '$DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$INIT_DB_NAME" -c "CREATE DATABASE \"$DB_NAME\";"
      echo "Database '$DB_NAME' created."
    else
      echo "Database '$DB_NAME' already exists."
    fi
    {{- end }}
    {{- if .Values.db.init.config.vectorStore.createUser }}

    # Create the vectorStore user if it does not exist
    echo "Creating Vector Store user if it does not exist..."
    echo "Managed User: $MANAGED_USER"
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" <<EOF
    DO \$\$
    BEGIN
      IF NOT EXISTS (
          SELECT FROM pg_catalog.pg_roles WHERE rolname = '${MANAGED_USER}'
      ) THEN
          EXECUTE format(
              'CREATE ROLE %I LOGIN NOINHERIT CREATEDB NOCREATEROLE NOSUPERUSER PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      ELSE
          EXECUTE format(
              'ALTER ROLE %I WITH PASSWORD %L',
              '${MANAGED_USER}', '${MANAGED_PASSWORD}'
          );
      END IF;
    END
    \$\$;
    EOF
    echo "Vector Store user '$MANAGED_USER' present."
    {{- end }}
    {{- if .Values.db.init.config.vectorStore.createSchema }}

    # Create the vectorStore schema if it does not exist
    echo "Checking if schema '$DB_SCHEMA' exists in database '$DB_NAME'..."
    if ! $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -tAc "SELECT 1 FROM information_schema.schemata WHERE schema_name = '$DB_SCHEMA'" | grep -q 1; then
      echo "Creating schema '$DB_SCHEMA' in database '$DB_NAME'..."
      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "CREATE SCHEMA \"$DB_SCHEMA\";"
      echo "Schema '$DB_SCHEMA' created in database '$DB_NAME'."

      $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS \"vector\" SCHEMA \"${DB_SCHEMA}\";"
    else
      echo "Schema '$DB_SCHEMA' already exists in database '$DB_NAME'."
    fi

    # Grant privileges to the managed user
    echo "Granting privileges to user '$MANAGED_USER' on schema '$DB_SCHEMA' in database '$DB_NAME'..."
    $PSQL -h "$DB_HOST" -p "$DB_PORT" -U "$USER" -d "$DB_NAME" -c "GRANT ALL ON SCHEMA \"$DB_SCHEMA\" TO \"${MANAGED_USER}\";"
    echo "User '$MANAGED_USER' granted privileges on schema '$DB_SCHEMA'."
    {{- end }}

    echo "Vector Store initialization completed."
{{- end }}

  clean_admin_secret.sh: |-

    #!/bin/bash

    KUBECTL=`which kubectl`
    cd /workdir

    NAMESPACE="{{ .Release.Namespace }}"

    # If /tmp/skip_cleanup exists, skip cleanup
    if [[ -f /tmp/skip_cleanup ]]; then
      echo "Init script skipped execution; skipping cleanup."
      exit 0
    fi

    echo "Cleaning up admin credentials secret in namespace ${NAMESPACE}..."
    echo $(${KUBECTL} -n ${NAMESPACE} get secret {{ printf "%s-admin-db-credentials" (include "retrieval-agent-manager.fullname" .) }})
    ${KUBECTL} -n ${NAMESPACE} patch secret {{ printf "%s-admin-db-credentials" (include "retrieval-agent-manager.fullname" .) }} --type=json -p='[{"op": "remove", "path": "/data/user"}]' 2>/dev/null || echo "Key 'user' not present or failed to remove."
    ${KUBECTL} -n ${NAMESPACE} patch secret {{ printf "%s-admin-db-credentials" (include "retrieval-agent-manager.fullname" .) }} --type=json -p='[{"op": "remove", "path": "/data/password"}]' 2>/dev/null || echo "Key 'password' not present or failed to remove."
    echo "Admin credentials secret cleaned up."
{{- end }}
