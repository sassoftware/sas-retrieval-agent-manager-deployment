{{- if .Values.db.init.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "db-initialization.serviceAccountName" . }}
  labels:
    {{- include "db-initialization.labels" . | nindent 4 }}
  {{- with .Values.db.init.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ printf "%s-admin-db-credentials" (include "retrieval-agent-manager.fullname" .) }}"]
    verbs: ["get", "patch"]
{{- end }}
