apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-monitoring-db-credentials" (include "retrieval-agent-manager.fullname" .) }}
  labels:
    {{- include "db-initialization.labels" . | nindent 4 }}
stringData:
  user: {{ .Values.users.monitoring.username | quote }}
  password: {{ .Values.users.monitoring.password | quote }}
