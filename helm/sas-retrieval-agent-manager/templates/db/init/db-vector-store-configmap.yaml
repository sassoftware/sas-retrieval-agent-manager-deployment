{{- if .Values.db.init.config.vectorStore.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-db-vector-store" (include "retrieval-agent-manager.fullname" .) }}
  labels:
    {{- include "db-initialization.labels" . | nindent 4 }}
data:
  enabled: {{ .Values.db.init.config.vectorStore.enabled | quote }}
  db: {{ .Values.db.init.config.vectorStore.db | quote }}
  schema: {{ .Values.db.init.config.vectorStore.schema | quote }}
{{- end }}
