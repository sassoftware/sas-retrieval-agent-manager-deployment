{{- if .Values.extraObjects }}
{{- range .Values.extraObjects }}
---
{{- $obj := . }}
{{- if typeIs "string" $obj }}
{{ tpl $obj $ }}
{{- else }}
{{- $merged := deepCopy $obj }}
{{- $_ := set $merged.metadata "namespace" $.Release.Namespace }}
{{- $_ := set $merged.metadata "labels" (merge (default dict $merged.metadata.labels) (dict "app.kubernetes.io/managed-by" "Helm")) }}
{{- $_ := set $merged.metadata "annotations" (merge (default dict $merged.metadata.annotations) (dict "meta.helm.sh/release-name" $.Release.Name "meta.helm.sh/release-namespace" $.Release.Namespace)) }}
{{ tpl (toYaml $merged) $ }}
{{- end }}
{{- end }}
{{- end }}