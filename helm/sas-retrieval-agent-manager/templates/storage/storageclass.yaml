{{- if eq (include "retrieval-agent-manager.createStorageClass" .) "true" }}
{{- $storageClassName := .Values.storage.customStorageClass.name }}
{{- $storageClass := lookup "storage.k8s.io/v1" "StorageClass" "" $storageClassName }}
{{- if not $storageClass }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ $storageClassName }}
  annotations:
    helm.sh/hook: pre-install
provisioner: file.csi.azure.com
allowVolumeExpansion: true
mountOptions:
- dir_mode=0777
- file_mode=0777
- mfsymlinks
- cache=strict
- actimeo=30
- uid=1001
- gid=1001
parameters:
  skuName: Standard_LRS
{{- end }}
{{- end }}
