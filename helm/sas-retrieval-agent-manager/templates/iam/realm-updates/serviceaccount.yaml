{{- if .Values.iam.keycloak.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keycloak.serviceAccountName" . }}-realm-update
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  {{- with .Values.iam.keycloak.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.iam.keycloak.serviceAccount.automount }}
{{- end }}
