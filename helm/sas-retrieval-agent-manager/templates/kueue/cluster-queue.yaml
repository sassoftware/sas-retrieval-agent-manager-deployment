{{- if .Values.integrations.kueue.enabled }}
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "cluster-queue"
  labels:
    {{- include "retrieval-agent-manager.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: "{{ .Release.Namespace }}"
  resourceGroups:
  - coveredResources: ["cpu", "memory", "pods", "nvidia.com/gpu"]
    flavors:
    - name: "retrieval-agent-manager"
      resources:
      - name: "cpu"
        nominalQuota: {{ .Values.integrations.kueue.config.cpuQuota | default "32" }}
      - name: "memory"
        nominalQuota: {{ .Values.integrations.kueue.config.memoryQuota | default "128Gi" }}
      - name: "pods"
        nominalQuota: {{ .Values.integrations.kueue.config.podQuota | default "6" }}
      - name: "nvidia.com/gpu"
        nominalQuota: {{ .Values.integrations.kueue.config.nvidiaGpuQuota | default "0" }}
{{- end }}
