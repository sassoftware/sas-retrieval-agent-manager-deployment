{{- if include "gpg.shouldGenerateKeys" . }}
{{- if .Values.security.gpg.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gpg.serviceAccountName" . }}
  labels:
    {{- include "gpg.labels" . | nindent 4 }}
  {{- with .Values.security.gpg.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ printf "%s-private-key" (include "gpg.fullname" .) }}" ]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ printf "%s-public-key" (include "gpg.fullname" .) }}"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["list", "create"]
{{- end }}
{{- end }}
