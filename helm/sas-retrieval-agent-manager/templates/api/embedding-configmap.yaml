apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-embedding-config" (include "api.fullname" .) }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  emb_inference_runner_repo: {{ printf "%s/%s" .Values.images.embedding.repo.base .Values.images.embedding.repo.path }}
  emb_inference_runner_tag_cpu: {{ .Values.images.embedding.tag | quote}}
  models_destination_dir: "/mnt/embedding_models"
