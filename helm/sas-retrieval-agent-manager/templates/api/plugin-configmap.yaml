apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-plugin-config" (include "api.fullname" .) }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  plugin_runner_repo: {{ printf "%s/%s" (include "images.plugin.repo.base" .)  (include "images.plugin.repo.path" .) }}
  plugin_runner_tag: {{ include "images.plugin.tag" .  | quote }}
