apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  {{- with .Values.api.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "api.labels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "oauth2-proxy.sidecar.init" . | nindent 8 }}
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          image: "{{ include "images.api" . }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          env:
            - name: KEYCLOAK_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  key: basePath
                  name: {{ printf "%s-config" (include "keycloak.fullname" .) }}
            - name: ENABLE_GENAI_TRACES
              value: {{ .Values.api.config.enable_genai_traces | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://vector.vector.svc.cluster.local:4318"
            - name: KEYCLOAK_SECRET_PATH
              value: {{ .Values.iam.keycloak.config.secret_path }}
            - name: LATEST_API_VERSION
              value: {{ .Values.api.latest_version | quote }}
            - name: RAM_LICENSE
              value: "/mnt/config/license"
            - name: LICENSE_SECRET
              value: {{ .Values.api.config.license_secret | default (printf "%s-license" (include "retrieval-agent-manager.fullname" .)) }}
            - name: GPG_PRIVATE_KEY_PATH
              value: "{{ .Values.security.gpg.config.private_key_path }}/private.key"
            - name: GPG_PASSPHRASE_PATH
              value: "{{ .Values.security.gpg.config.passphrase_path }}/passphrase.txt"
            - name: ESP_VECTORHUB_TAG
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-vector-hub-config" (include "api.fullname" .) }}
                  key: vhub_tag
            - name: ESP_VECTORHUB_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-vector-hub-config" (include "api.fullname" .) }}
                  key: vhub_repository
            - name: AGENT_RUNNER_TAG
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-agent-config" (include "api.fullname" .) }}
                  key: agent_runner_tag
            - name: AGENT_RUNNER_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-agent-config" (include "api.fullname" .) }}
                  key: agent_runner_repo
            - name: PLUGIN_RUNNER_TAG
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-plugin-config" (include "api.fullname" .) }}
                  key: plugin_runner_tag
            - name: PLUGIN_RUNNER_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-plugin-config" (include "api.fullname" .) }}
                  key: plugin_runner_repo
            - name: EMB_INFERENCE_RUNNER_REPO
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-embedding-config" (include "api.fullname" .) }}
                  key: emb_inference_runner_repo
            - name: EMB_INFERENCE_RUNNER_TAG_CPU
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-embedding-config" (include "api.fullname" .) }}
                  key: emb_inference_runner_tag_cpu
            - name: EVAL_RUNNER_TAG
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-evaluation-config" (include "api.fullname" .) }}
                  key: eval_runner_tag
            - name: EVAL_RUNNER_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-evaluation-config" (include "api.fullname" .) }}
                  key: eval_runner_repo
            - name: IMAGE_PULL_SECRET
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-vector-hub-config" (include "api.fullname" .) }}
                  key: vhub_pull_secret
            - name: SASRAM_PG_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-config" (include "postgrest.fullname" .) }}
                  key: adminInClusterUrl
            - name: SASRAM_PG_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-config" (include "postgrest.fullname" .) }}
                  key: inClusterUrl
            - name: SASRAM_PG_MONITORING_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-config" (include "postgrest.fullname" .) }}
                  key: monitoringInClusterUrl
            - name: BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-config" (include "api.fullname" .) }}
                  key: base_path
            {{- if .Values.integrations.trustedCerts.enabled }}
            - name: TRUSTED_CERTS_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-config" (include "api.fullname" .) }}
                  key: trusted_certs_path
            {{- end }}
            {{- if or .Values.vectorizationHub.config.postgreSQLCertSecret .Values.vectorizationHub.config.awsCertSecret }}
            - name: AWS_CERT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: {{ printf "%s-vector-hub-config" (include "api.fullname" .) }}
                  key: postgresql_cert_secret
            {{- end }}
            - name: SSL_VERIFY
              value: '{{ .Values.api.config.sslVerify }}'
            - name: LOG_LEVEL
              value: '{{ .Values.api.config.log_level }}'
            - name: NUM_WORKERS
              value: '{{ .Values.api.config.num_workers }}'
            - name: ENABLE_DEV_MODE
              value: '{{ .Values.api.config.enable_dev_mode }}'
            - name: HIDE_LLM_SECRETS
              value: '{{ .Values.api.config.hide_llm_secrets }}'
            - name: HIDE_DESTINATION_SECRETS
              value: '{{ .Values.api.config.hide_destination_secrets }}'
            {{- with .Values.api.config.azure_settings.openAI.default_api_version }}
            - name: AZURE_OPENAI_DEFAULT_API_VERSION
              value: '{{ . }}'
            {{- end }}
            {{- if .Values.api.config.azure_settings.azure_identity.enabled }}
            {{- with .Values.api.config.azure_settings.azure_identity.scope }}
            - name: AZURE_IDENTITY_SCOPE
              value: '{{ . }}'
            {{- end }}
            {{- with .Values.api.config.azure_settings.azure_identity.enabled }}
            - name: AZURE_IDENTITY_ENABLED
              value: '{{ . }}'
            {{- end }}
            {{- with .Values.api.config.azure_settings.azure_identity.token_keyword }}
            - name: AZURE_IDENTITY_TOKEN_KEYWORD
              value: '{{ . }}'
            {{- end }}
            - name: EVAL_SERVICE_ACCOUNT_NAME
              value: {{ include "api.serviceAccountName" . }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
            - name: noauth-http
              containerPort: 8766
              protocol: TCP
          livenessProbe:
            {{- include "api.livenessProbe" . | nindent 12 }}
          readinessProbe:
            {{- include "api.readinessProbe" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /tmp
              name: temp-storage
            - name: config-volume
              mountPath: "/mnt/config/api"
            - name: vhub-config-volume
              mountPath: "/mnt/config/vhub"
            - name: vhub-config-volume
              mountPath: "/mnt/config/available_hardware.json"
              subPath: available_hardware
            - name: agent-config-volume
              mountPath: "/mnt/config/agent"
            - name: plugin-config-volume
              mountPath: "/mnt/config/plugin"
            - name: embedding-config-volume
              mountPath: "/mnt/config/embedding"
            - name: postgrest-config-volume
              mountPath: "/mnt/config/postgrest"
            - name: data
              mountPath: "/mnt/data"
              readOnly: false
            - name: embedding-models
              mountPath: "/mnt/embedding_models"
              readOnly: true
            - name: license-volume
              mountPath: "/mnt/config/license"
              readOnly: true
            - name: keycloak-volume
              mountPath: {{ .Values.iam.keycloak.config.secret_path }}
              readOnly: true
            - name: gpg-private-key-volume
              mountPath: {{ .Values.security.gpg.config.private_key_path }}
              readOnly: true
            - name: gpg-passphrase-volume
              mountPath: {{ .Values.security.gpg.config.passphrase_path }}
              readOnly: true
            - name: db-connection-volume
              mountPath: "/mnt/config/db-connection"
              readOnly: true
            - name: db-application-volume
              mountPath: "/mnt/config/db-application"
              readOnly: true
            - name: db-monitoring-volume
              mountPath: "/mnt/config/db-monitoring"
              readOnly: true
            - name: embedding-db-credentials-volume
              mountPath: "/mnt/config/embedding-db-credentials"
              readOnly: true
            {{- if .Values.integrations.trustedCerts.enabled }}
            - name: trusted-certs-volume
              mountPath: /mnt/config/certs
              readOnly: true
            {{- end }}
          {{- with .Values.api.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- include "oauth2-proxy.sidecar" (dict "Root" . "upstreamPort" 8765) | nindent 8 }}
      volumes:
        {{- include "oauth2-proxy.sidecar.volumes" . | nindent 8 }}
        - name: temp-storage
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: vhub-pv
        - name: embedding-models
          persistentVolumeClaim:
            claimName: embedding-pv
        - name: config-volume
          configMap:
            name: {{ printf "%s-config" (include "api.fullname" .) }}
        - name: vhub-config-volume
          configMap:
            name: {{ printf "%s-vector-hub-config" (include "api.fullname" .) }}
        - name: agent-config-volume
          configMap:
            name: {{ printf "%s-agent-config" (include "api.fullname" .) }}
        - name: plugin-config-volume
          configMap:
            name: {{ printf "%s-plugin-config" (include "api.fullname" .) }}
        - name: embedding-config-volume
          configMap:
            name: {{ printf "%s-embedding-config" (include "api.fullname" .) }}
        - name: postgrest-config-volume
          configMap:
            name: {{ printf "%s-config" (include "postgrest.fullname" .) }}
        - name: license-volume
          secret:
            secretName: {{ printf "%s-license" (include "retrieval-agent-manager.fullname" .) }}
            items:
              - key: license.jwt
                path: license.jwt
        - name: keycloak-volume
          secret:
            secretName: {{ printf "%s-client-secret" (include "keycloak.fullname" .) }}
            items:
              - key: realm
                path: realm.txt
              - key: url
                path: url.txt
              - key: sv-client-id
                path: client_id.txt
              - key: sv-client-secret
                path: client_secret.txt
        - name: gpg-private-key-volume
          secret:
            secretName: {{ printf "%s-private-key" (include "gpg.fullname" .) }}
            items:
              - key: privateKey
                path: private.key
        - name: gpg-passphrase-volume
          secret:
            secretName: {{ printf "%s-passphrase" (include "gpg.fullname" .) }}
            items:
              - key: passphrase
                path: passphrase.txt
        - name: db-connection-volume
          configMap:
            name: {{ printf "%s-db-connection" (include "retrieval-agent-manager.fullname" .) }}
        - name: db-application-volume
          configMap:
            name: {{ printf "%s-db-application" (include "retrieval-agent-manager.fullname" .) }}
        - name: db-monitoring-volume
          configMap:
            name: {{ printf "%s-db-monitoring" (include "retrieval-agent-manager.fullname" .) }}
        - name: embedding-db-credentials-volume
          secret:
            secretName: {{ printf "%s-embedding-db-credentials" (include "retrieval-agent-manager.fullname" .) }}
            items:
              - key: user
                path: user
              - key: password
                path: password
        {{- if .Values.integrations.trustedCerts.enabled }}
        - name: trusted-certs-volume
          {{- if eq (.Values.integrations.trustedCerts.type | lower) "configmap" }}
          configMap:
            name: {{ .Values.integrations.trustedCerts.name }}
            optional: true
          {{- else if eq (.Values.integrations.trustedCerts.type | lower) "secret" }}
          secret:
            secretName: {{ .Values.integrations.trustedCerts.name }}
            optional: true
          {{- end }}
        {{- end }}
      {{- with .Values.api.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
