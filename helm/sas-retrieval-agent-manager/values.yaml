# @schema
# type: object
# @schema
# -- SAS Retrieval Agent Manager API: Main backend service
api:
  # @schema
  # type: object
  # @schema
  config:
    # @schema
    # type: string
    # @schema
    # -- Whether to send traces to the observability platform via vector
    enable_genai_traces: 'False'
    # @schema
    # type: string
    # required: true
    # @schema
    # -- License content (if not using secret)
    license: ""
    # @schema
    # type: [string,null]
    # required: false
    # default: null
    # @schema
    # -- Name of the license secret
    license_secret: null
    # @schema
    # type: string
    # required: true
    # @schema
    # -- Whether to hide the LLM api key in the UI
    hide_llm_secrets: 'False'
    # @schema
    # type: string
    # required: true
    # @schema
    # -- Whether to hide the destination secrets in the UI
    hide_destination_secrets: 'False'
    # @schema
    # enum: [DEBUG, INFO, WARNING, ERROR]
    # required: true
    # @schema
    # -- Log level for the API
    log_level: INFO
    # @schema
    # type: string
    # required: true
    # @schema
    # -- Enable development mode features
    enable_dev_mode: 'False'
    # @schema
    # type: integer
    # default: 4
    # required: true
    # @schema
    # -- Number of worker processes
    num_workers: 4
    # @schema
    # type: string
    # required: true
    # @schema
    # -- SSL verification setting
    sslVerify: 'True'
    # @schema
    # type: string
    # required: true
    # @schema
    # -- Base path for API endpoints
    base_path: /SASRetrievalAgentManager/api

    # @schema
    # required: true
    # type: object
    # @schema
    # -- Azure integration settings for API and identity management
    azure_settings:
      openAI:
        # @schema
        # type: string
        # required: true
        # @schema
        # -- Default API version for Azure OpenAI service (format: YYYY-MM-DD)
        default_api_version: "2024-10-21"
      # @schema
      # required: true
      # type: object
      # @schema
      # -- Azure integration settings for identity management
      azure_identity:
        # @schema
        # required: true
        # type: boolean
        # default: false
        # @schema
        # -- Enable Azure AD identity integration (true/false)
        enabled: false
        # @schema
        # type: string
        # required: true
        # @schema
        # -- Keyword used to identify Azure identity tokens in requests
        token_keyword: "AZURE_IDENTITY"
        # @schema
        # type: string
        # required: true
        # @schema
        # -- OAuth2 scope for Azure Cognitive Services authentication
        scope: "https://cognitiveservices.azure.com/.default"
        # @schema
        # type: string
        # required: true
        # @schema
        # -- Azure AD client ID for authentication (leave blank to disable)
        client_id: ""

  # @schema
  # type: integer
  # required: true
  # minimum: 0
  # default: 1
  # @schema
  # -- Number of replicas to run. Chart is not designed to scale horizontally, use at your own risk
  replicaCount: 1

  # @schema
  # type: string
  # required: true
  # @schema
  # -- Latest API version
  latest_version: v1

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/serviceaccount-schema.json"
  # @schema
  # -- Service account configuration for API
  serviceAccount:
    # -- Annotations to add to the service account
    annotations: {}
    # -- Automatically mount a ServiceAccount's API credentials
    automount: true
    # -- Specifies whether a service account should be created
    create: true
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ''

  # @schema
  # type: object
  # @schema
  # -- Settings for the services being spawned by the API. These include the embedding model service and the vector store service.
  spawn:
    # @schema
    # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/serviceaccount-schema.json"
    # @schema
    # -- Service account configuration for API
    serviceAccount:
      # -- Annotations to add to the service account
      annotations: {}
      # -- Automatically mount a ServiceAccount's API credentials
      automount: true
      # -- Specifies whether a service account should be created
      create: true
      # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
      name: ''

  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  # -- Annotations to add to the pods
  podAnnotations: {}

  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  # -- Labels to add to the pods
  podLabels:
    sas.com/deployment: "retrieval-agent-manager"
    workload.sas.com/class: "ram"

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/podsecuritycontext-schema.json"
  # @schema
  # -- The security context for the pods
  podSecurityContext:
    # -- Group ID to run the entrypoint of the container process
    runAsGroup: 1001
    # -- Indicates that the container must be run as a non-root user
    runAsNonRoot: true
    # -- User ID to run the entrypoint of the container process
    runAsUser: 1001
    # -- Seccomp profile for the pod
    seccompProfile:
      type: RuntimeDefault
    # -- Group ID for file system ownership
    fsGroup: 1001

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/securitycontext-schema.json"
  # @schema
  # -- The security context for the application container
  securityContext:
    # -- Run as non-privileged container
    privileged: false
    # -- Seccomp profile for the container
    seccompProfile:
      type: RuntimeDefault
    # -- Whether a process can gain more privileges than its parent process
    allowPrivilegeEscalation: false
    # -- Linux capabilities to add/drop for the container
    capabilities:
      add: []
      drop:
        - ALL
    # -- Whether the container has a read-only root filesystem
    readOnlyRootFilesystem: true
    # -- Whether the container must be run as a non-root user
    runAsNonRoot: true
    # -- User ID to run the entrypoint of the container process
    runAsUser: 1001
    # -- Group ID to run the entrypoint of the container process
    runAsGroup: 1001

  # @schema
  # type: object
  # additionalProperties: false
  # properties:
  #   type:
  #     type: string
  #   port:
  #     type: integer
  #     default: 80
  #   internalPort:
  #     type: integer
  #     default: 8765
  # required: [port, internalPort]
  # @schema
  # -- Kubernetes Service configuration
  service:
    # -- Kubernetes Service type
    type: ClusterIP
    # -- Kubernetes Service port (routes through OAuth2 proxy for ingress/external traffic)
    port: 80
    # -- Internal service port (bypasses OAuth2 proxy for service-to-service calls)
    internalPort: 8765

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/resources-schema.json"
  # @schema
  # -- The resources to allocate for the API container
  resources:
    # -- Resource limits for the container
    limits:
      # -- CPU limit
      cpu: 4
      # -- Memory limit
      memory: 10Gi
    # -- Resource requests for the container
    requests:
      # -- CPU request
      cpu: 500m
      # -- Memory request
      memory: 4Gi

  # @schema
  # type: object
  # @schema
  # -- Liveness probe configuration for API
  livenessProbe:
    # @schema
    # type: integer
    # minimum: 1
    # default: 15
    # @schema
    # -- Number of consecutive failures required to mark container as not ready
    failureThreshold: 15
    # @schema
    # type: integer
    # minimum: 1
    # default: 10
    # @schema
    # -- How often to perform the probe
    periodSeconds: 10
    # @schema
    # type: integer
    # minimum: 0
    # default: 30
    # @schema
    # -- Initial delay before starting probes
    initialDelaySeconds: 30
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Minimum consecutive successes for the probe to be considered successful
    successThreshold: 1
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Timeout for the probe
    timeoutSeconds: 1

  # @schema
  # type: object
  # @schema
  # -- Readiness probe configuration for API
  readinessProbe:
    # @schema
    # type: integer
    # minimum: 1
    # default: 5
    # @schema
    # -- Number of consecutive failures required to mark container as not ready
    failureThreshold: 5
    # @schema
    # type: integer
    # minimum: 1
    # default: 10
    # @schema
    # -- How often to perform the probe
    periodSeconds: 10
    # @schema
    # type: integer
    # minimum: 0
    # default: 30
    # @schema
    # -- Initial delay before starting probes
    initialDelaySeconds: 30
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Minimum consecutive successes for the probe to be considered successful
    successThreshold: 1
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Timeout for the probe
    timeoutSeconds: 1

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/autoscaling-schema.json"
  # @schema
  # -- Horizontal Pod Autoscaler configuration
  autoscaling:
    # -- Enable horizontal pod autoscaling
    enabled: false
    # -- Maximum number of replicas
    maxReplicas: 100
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Target CPU utilization percentage for scaling
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilization percentage for scaling (optional)
    targetMemoryUtilizationPercentage: 80

  # @schema
  # type: array
  # items:
  #   type: object
  # @schema
  # -- Additional volumes on the output Deployment definition
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # @schema
  # type: array
  # items:
  #   type: object
  # @schema
  # -- Additional volumeMounts on the output Deployment definition
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/nodeselector-schema.json"
  # @schema
  # -- Node labels for pod assignment
  nodeSelector: {}

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/tolerations-schema.json"
  # @schema
  # -- Tolerations for pod assignment
  tolerations: []


  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/affinity-schema.json"
  # @schema
  # -- Map of node/pod affinities
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: sas.com/deployment
            operator: In
            values:
            - retrieval-agent-manager
      - weight: 2
        preference:
          matchExpressions:
          - key: workload.sas.com/class
            operator: In
            values:
            - ram
