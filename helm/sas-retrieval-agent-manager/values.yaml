        tesseract:
        - eng       # English
        - chi_tra   # Chinese Traditional
        - jpn       # Japanese
        - dan       # Danish
        - deu       # German (Deutsch)
        - spa       # Spanish
        - fra       # French
        - ita       # Italian
        - nld       # Dutch (Nederlands)
        - pol       # Polish
        - por       # Portuguese
        - chi_sim   # Chinese Simplified
        - osd       # Orientation and Script Detection
        - equ       # Math/Equation Detection
        - ara       # Arabic
        - tur       # Turkish

