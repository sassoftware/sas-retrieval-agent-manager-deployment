  # @schema
  # -- Kubernetes Service configuration
  service:
    # -- Kubernetes Service type
    type: ClusterIP
    # -- Kubernetes Service port (routes through OAuth2 proxy for ingress/external traffic)
    port: 8080
    # -- Internal service port (bypasses OAuth2 proxy for service-to-service calls)
    internalPort: 8180

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/resources-schema.json"
  # @schema
  # -- The resources to allocate for the container
  resources:
    # -- Resource limits for the container
    limits:
      # -- CPU limit
      cpu: 1
      # -- Memory limit
      memory: 512Mi
    # -- Resource requests for the container
    requests:
      # -- CPU request
      cpu: 50m
      # -- Memory request
      memory: 256Mi

  # @schema
  # type: object
  # @schema
  # -- Liveness probe configuration
  livenessProbe:
    # @schema
    # type: integer
    # minimum: 1
    # default: 9
    # @schema
    # -- Number of consecutive failures required to mark container as not ready
    failureThreshold: 9
    # @schema
    # type: integer
    # minimum: 1
    # default: 15
    # @schema
    # -- How often to perform the probe
    periodSeconds: 15
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Minimum consecutive successes for the probe to be considered successful
    successThreshold: 1
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Timeout for the probe
    timeoutSeconds: 1

  # @schema
  # type: object
  # @schema
  # -- Readiness probe configuration
  readinessProbe:
    # @schema
    # type: integer
    # minimum: 1
    # default: 9
    # @schema
    # -- Number of consecutive failures required to mark container as not ready
    failureThreshold: 9
    # @schema
    # type: integer
    # minimum: 1
    # default: 15
    # @schema
    # -- How often to perform the probe
    periodSeconds: 15
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Minimum consecutive successes for the probe to be considered successful
    successThreshold: 1
    # @schema
    # type: integer
    # minimum: 1
    # default: 1
    # @schema
    # -- Timeout for the probe
    timeoutSeconds: 1

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/autoscaling-schema.json"
  # @schema
  # -- Horizontal Pod Autoscaler configuration
  autoscaling:
    # -- Enable horizontal pod autoscaling
    enabled: false
    # -- Maximum number of replicas
    maxReplicas: 100
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Target CPU utilization percentage for scaling
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilization percentage for scaling (optional)
    targetMemoryUtilizationPercentage: 80

  # @schema
  # type: array
  # items:
  #   type: object
  # @schema
  # -- Additional volumes on the output Deployment definition
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # @schema
  # type: array
  # items:
  #   type: object
  # @schema
  # -- Additional volumeMounts on the output Deployment definition
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/nodeselector-schema.json"
  # @schema
  # -- Node labels for pod assignment
  nodeSelector: {}

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/tolerations-schema.json"
  # @schema
  # -- Tolerations for pod assignment
  tolerations: []

  # @schema
  # $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/affinity-schema.json"
  # @schema
  # -- Map of node/pod affinities
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: sas.com/deployment
            operator: In
            values:
            - retrieval-agent-manager
      - weight: 2
        preference:
          matchExpressions:
          - key: workload.sas.com/class
            operator: In
            values:
            - ram

# @schema
# type: object
# properties:
#   embedding:
#     type: object
#     required: true
#     properties:
#       pvc:
#         $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/storage-schema.json"
#   application:
#     type: object
#     required: true
#     properties:
#       pvc:
#         $ref: "https://raw.githubusercontent.com/sassoftware/sas-retrieval-agent-manager-deployment/refs/heads/schemas/schemas/storage-schema.json"
#   customStorageClass:
#     type: object
#     required: true
#     properties:
#       name:
#         type: string
#         default: azurefile-sas
#       create:
#         type: [boolean, null]
#         default: null
# @schema
# -- SAS Retrieval Agent Manager Storage: Storage services
storage:
  # -- allows the creation of a custom storage class, used for an azurefile fix.
  customStorageClass:
    # -- Storage class name for the custom storage class (only used for an azurefile fix)
    name: azurefile-sas
    # -- Whether to create the custom storage class
    create: null
  # @schema
  # type: object
  # required: true
  # @schema
  # -- Embedding storage configuration
  embedding:
    # @schema
    # type: object
    # required: true
    # @schema
    # -- Persistent Volume Claim configuration for embedding models
    pvc:
      # @schema
      # type: string
      # required: true
      # default: "embedding-pv"
      # @schema
      # -- Name for the PVC
      name: embedding-pv
      # @schema
      # type: string
      # required: true
      # default: "azurefile-sas"
      # @schema
      # -- Storage class name for the embedding PVC
      storageClassName: null
      # -- Access modes for the embedding PVC
      accessModes:
        - ReadWriteMany
      # @schema
      # type: string
      # required: true
      # pattern: "^[0-9]+(Gi|Mi|Ki|Ti)$"
      # default: "40Gi"
      # @schema
      # -- Size for the embedding PVC
      size: 40Gi
      # @schema
      # type: string
      # default: ""
      # @schema
      # -- Existing claim name for the embedding PVC (if not creating a new one)
      existingClaim: ""
  # @schema
  # type: object
  # required: true
  # @schema
  # -- Application data storage configuration
  application:
      # -- Persistent Volume Claim configuration (only used when type is 'pvc')
      pvc:
        # -- Name for the PVC
        name: vhub-pv
        # -- Storage class name for the root directory PVC
        storageClassName: null
        # -- Access modes for the root directory PVC
        accessModes:
          - ReadWriteOnce
        # -- Size for the root directory PVC
        size: 20Gi
        # -- Existing claim name for the root directory PVC (if not creating a new one)
        existingClaim: ""

# @schema
# type: object
# required: true
# @schema
# -- Integrations with external services
integrations:
  # @schema
  # type: object
  # required: true
  # @schema
  # -- Viya configuration for when deploying in parallel
  viya:
    # @schema
    # type: boolean
    # required: true
    # @schema
    # -- Wether or not viya is enabled on the cluster
    enabled: false
  # @schema
  # type: object
  # required: true
  # @schema
  # -- Kueue configuration for job scheduling and resource management
  kueue:
    # @schema
    # type: boolean
    # required: false
    # @schema
    # -- Kueue enablement flag
    enabled: true
    # @schema
    # type: object
    # required: false
    # @schema
    # -- Kueue configuration
    config:
      # @schema
      # type: string
      # required: false
      # @schema
      # -- Kueue CPU quota
      cpuQuota: "32"
      # @schema
      # type: string
      # required: false
      # @schema
      # -- Kueue memory quota
      memoryQuota: "128Gi"
      # @schema
      # type: integer
      # required: false
      # @schema
      # -- Kueue pod quota
      podQuota: 6
      # @schema
      # type: integer
      # required: false
      # @schema
      # -- Kueue gpu quota
      nvidiaGpuQuota: 0
  # @schema
  # type: object
  # required: true
  # @schema
  # -- Trusted certificate configuration for secure communication with external services
  trustedCerts:
    # @schema
    # type: boolean
    # required: false
    # @schema
    enabled: false
    # @schema
    # enum: [configMap, secret, null]
    # required: false
    # @schema
    # -- Type of Kubernetes resource used to store trusted certificates
    # Be aware that when managing these with trust-manager, it requires some explicit configuration to work with the operator.
    # Refer to the documentation for more details: https://cert-manager.io/docs/trust/trust-manager/installation/#enable-secret-targets
    type: configMap
    # @schema
    # type: string
    # required: false
    # @schema
    # -- Name of the ConfigMap or Secret containing trusted certificates (if enabled)
    name: "trusted-certs-bundle"
