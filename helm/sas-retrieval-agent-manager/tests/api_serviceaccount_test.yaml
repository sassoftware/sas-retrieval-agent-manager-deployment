suite: API ServiceAccount tests
templates:
  - templates/api/serviceaccount.yaml
values:
  - ../values.yaml

tests:
  # ============================================================================
  # ServiceAccount creation tests
  # ============================================================================
  - it: should render ServiceAccount when create is true
    set:
      api.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount

  - it: should not render ServiceAccount when create is false
    set:
      api.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # ============================================================================
  # ServiceAccount name tests
  # ============================================================================
  - it: should use default name when not specified
    set:
      api.serviceAccount.create: true
      api.serviceAccount.name: ""
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-api$"

  - it: should use custom name when specified
    set:
      api.serviceAccount.create: true
      api.serviceAccount.name: custom-sa-name
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa-name

  # ============================================================================
  # Annotations tests
  # ============================================================================
  - it: should include annotations when provided
    set:
      api.serviceAccount.create: true
      api.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/my-role"

  # ============================================================================
  # Labels tests
  # ============================================================================
  - it: should include standard labels
    set:
      api.serviceAccount.create: true
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
