suite: ServiceAccount tests for all components
templates:
  - templates/api/serviceaccount.yaml
  - templates/api/spawn-serviceaccount.yaml
  - templates/ui/serviceaccount.yaml
  - templates/iam/keycloak/serviceaccount.yaml
  - templates/db/rest/serviceaccount.yaml
  - templates/db/init/serviceaccount.yaml
  - templates/db/migration/serviceaccount.yaml
values:
  - ../values.yaml

tests:
  # ============================================================================
  # API ServiceAccount tests
  # ============================================================================
  - it: API - should render ServiceAccount when create is true
    template: templates/api/serviceaccount.yaml
    set:
      api.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: API - should not render ServiceAccount when create is false
    template: templates/api/serviceaccount.yaml
    set:
      api.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: API - should use custom name when specified
    template: templates/api/serviceaccount.yaml
    set:
      api.serviceAccount.create: true
      api.serviceAccount.name: my-custom-api-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-api-sa

  - it: API - should include annotations when provided
    template: templates/api/serviceaccount.yaml
    set:
      api.serviceAccount.create: true
      api.serviceAccount.annotations:
        custom-annotation: custom-value
    asserts:
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: custom-value

  # ============================================================================
  # API Spawn ServiceAccount tests
  # ============================================================================
  - it: API Spawn - should render ServiceAccount when create is true
    template: templates/api/spawn-serviceaccount.yaml
    set:
      api.spawn.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: API Spawn - should not render ServiceAccount when create is false
    template: templates/api/spawn-serviceaccount.yaml
    set:
      api.spawn.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: API Spawn - should have spawn suffix in default name
    template: templates/api/spawn-serviceaccount.yaml
    set:
      api.spawn.serviceAccount.create: true
      api.spawn.serviceAccount.name: ""
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-spawn$"

  # ============================================================================
  # UI ServiceAccount tests
  # ============================================================================
  - it: UI - should render ServiceAccount when create is true
    template: templates/ui/serviceaccount.yaml
    set:
      ui.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: UI - should not render ServiceAccount when create is false
    template: templates/ui/serviceaccount.yaml
    set:
      ui.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: UI - should use custom name when specified
    template: templates/ui/serviceaccount.yaml
    set:
      ui.serviceAccount.create: true
      ui.serviceAccount.name: my-custom-ui-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-ui-sa

  # ============================================================================
  # Keycloak ServiceAccount tests
  # ============================================================================
  - it: Keycloak - should render ServiceAccount when create is true
    template: templates/iam/keycloak/serviceaccount.yaml
    set:
      iam.keycloak.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: Keycloak - should not render ServiceAccount when create is false
    template: templates/iam/keycloak/serviceaccount.yaml
    set:
      iam.keycloak.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Keycloak - should use custom name when specified
    template: templates/iam/keycloak/serviceaccount.yaml
    set:
      iam.keycloak.serviceAccount.create: true
      iam.keycloak.serviceAccount.name: my-custom-keycloak-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-keycloak-sa

  # ============================================================================
  # PostgREST ServiceAccount tests
  # ============================================================================
  - it: PostgREST - should render ServiceAccount when create is true
    template: templates/db/rest/serviceaccount.yaml
    set:
      db.rest.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: PostgREST - should not render ServiceAccount when create is false
    template: templates/db/rest/serviceaccount.yaml
    set:
      db.rest.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: PostgREST - should use custom name when specified
    template: templates/db/rest/serviceaccount.yaml
    set:
      db.rest.serviceAccount.create: true
      db.rest.serviceAccount.name: my-custom-postgrest-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-postgrest-sa

  # ============================================================================
  # DB Init ServiceAccount tests
  # ============================================================================
  - it: DB Init - should render ServiceAccount when create is true
    template: templates/db/init/serviceaccount.yaml
    set:
      db.init.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: DB Init - should not render ServiceAccount when create is false
    template: templates/db/init/serviceaccount.yaml
    set:
      db.init.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # ============================================================================
  # DB Migration ServiceAccount tests
  # ============================================================================
  - it: DB Migration - should render ServiceAccount when create is true
    template: templates/db/migration/serviceaccount.yaml
    set:
      db.migration.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: DB Migration - should not render ServiceAccount when create is false
    template: templates/db/migration/serviceaccount.yaml
    set:
      db.migration.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # ============================================================================
  # Standard labels tests (all service accounts)
  # ============================================================================
  - it: API - should include standard labels
    template: templates/api/serviceaccount.yaml
    set:
      api.serviceAccount.create: true
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: UI - should include standard labels
    template: templates/ui/serviceaccount.yaml
    set:
      ui.serviceAccount.create: true
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: Keycloak - should include standard labels
    template: templates/iam/keycloak/serviceaccount.yaml
    set:
      iam.keycloak.serviceAccount.create: true
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
