suite: API Service tests
templates:
  - templates/api/service.yaml
values:
  - ../values.yaml

tests:
  # ============================================================================
  # Basic service structure tests
  # ============================================================================
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - isAPIVersion:
          of: v1

  - it: should have correct name
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-api$"

  # ============================================================================
  # Service type tests
  # ============================================================================
  - it: should use ClusterIP type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should use custom service type when provided
    set:
      api.service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  # ============================================================================
  # Port configuration tests
  # ============================================================================
  - it: should configure http port correctly (routes through OAuth2 proxy)
    set:
      api.service.port: 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 8080
            targetPort: oauth2-proxy0
            protocol: TCP
            name: http
          any: true

  - it: should configure http-internal port correctly (bypasses OAuth2 proxy)
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 8765
            targetPort: http
            protocol: TCP
            name: http-internal
          any: true

  - it: should have two ports defined
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2

  - it: should use custom internalPort when provided
    set:
      api.service.internalPort: 9999
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 9999
            targetPort: http
            protocol: TCP
            name: http-internal
          any: true

  # ============================================================================
  # Labels tests
  # ============================================================================
  - it: should include standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]

  # ============================================================================
  # Selector tests
  # ============================================================================
  - it: should have correct selector labels
    asserts:
      - exists:
          path: spec.selector["app.kubernetes.io/name"]
      - exists:
          path: spec.selector["app.kubernetes.io/instance"]
