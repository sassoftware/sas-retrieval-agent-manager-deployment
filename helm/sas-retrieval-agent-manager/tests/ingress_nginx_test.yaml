suite: Nginx Ingress template tests
templates:
  - templates/ingress/api-ingress.yaml
  - templates/ingress/ui-ingress.yaml
  - templates/ingress/keycloak-ingress.yaml
  - templates/ingress/postgrest-ingress.yaml
values:
  - ../values.yaml

tests:
  # ============================================================================
  # Nginx Ingress basic structure tests
  # ============================================================================
  - it: should render Ingress with correct apiVersion
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - isAPIVersion:
          of: networking.k8s.io/v1
      - isKind:
          of: Ingress

  - it: should set correct ingressClassName
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  # ============================================================================
  # Default nginx annotations tests
  # ============================================================================
  - it: should include default nginx annotations
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["kubernetes.io/ingress.allow-http"]
          value: "false"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: 500m
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-buffer-size"]
          value: 16k
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/ssl-redirect"]
          value: "true"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-cors"]
          value: "true"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-regex"]
          value: "true"

  # ============================================================================
  # API-specific annotations tests
  # ============================================================================
  - it: API - should include auth-response-headers annotation
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/auth-response-headers"]
          value: "Authorization,X-Auth-Request-Access-Token"

  - it: API - should include tls-acme annotation
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["kubernetes.io/tls-acme"]
          value: "true"

  # ============================================================================
  # UI-specific annotations tests
  # ============================================================================
  - it: UI - default should not include app-root annotation
    template: templates/ingress/ui-ingress.yaml
    set:
      platform: azure
      ingress:
        enabled: true
        enableRootIngress: false
    asserts:
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/app-root"]

  - it: UI - should include app-root annotation when enableRootIngress is true
    template: templates/ingress/ui-ingress.yaml
    set:
      platform: azure
      ingress:
        enabled: true
        enableRootIngress: true
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/app-root"]
          value: "/SASRetrievalAgentManager"

  - it: UI - should include auth-response-headers annotation
    template: templates/ingress/ui-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/auth-response-headers"]
          value: "Authorization"

  # ============================================================================
  # PostgREST-specific annotations tests
  # ============================================================================
  - it: PostgREST - should include rewrite-target annotation
    template: templates/ingress/postgrest-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: "/$2"

  # ============================================================================
  # Custom annotations override tests
  # ============================================================================
  - it: should allow overriding global annotations
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
      ingress.annotations:
        custom-global-annotation: global-value
    asserts:
      - equal:
          path: metadata.annotations["custom-global-annotation"]
          value: global-value

  - it: should allow component-specific annotation overrides
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
      ingress.api.annotations:
        custom-api-annotation: api-value
    asserts:
      - equal:
          path: metadata.annotations["custom-api-annotation"]
          value: api-value

  # ============================================================================
  # TLS configuration tests
  # ============================================================================
  - it: should include TLS hosts and secretName when enabled
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
      ingress.domain: my-app.example.com
      ingress.tls.enabled: true
      ingress.tls.secretName: my-tls-secret
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: my-app.example.com
      - equal:
          path: spec.tls[0].secretName
          value: my-tls-secret

  # ============================================================================
  # Rules configuration tests
  # ============================================================================
  - it: should set correct host in rules
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
      ingress.domain: my-app.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: my-app.example.com

  - it: should use ImplementationSpecific pathType
    template: templates/ingress/api-ingress.yaml
    set:
      platform: azure
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: ImplementationSpecific
