suite: API Deployment tests
templates:
  - templates/api/deployment.yaml
values:
  - ../values.yaml

tests:
  # ============================================================================
  # Basic deployment structure tests
  # ============================================================================
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: should have correct name
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-api$"

  # ============================================================================
  # Replica count tests
  # ============================================================================
  - it: should set replicas when autoscaling is disabled
    set:
      api.autoscaling.enabled: false
      api.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should not set replicas when autoscaling is enabled
    set:
      api.autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  # ============================================================================
  # Deployment strategy tests - strategy is applied via values if present
  # ============================================================================

  # ============================================================================
  # Pod annotations and labels tests
  # ============================================================================
  - it: should include pod annotations when provided
    set:
      api.podAnnotations:
        custom-annotation: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: custom-value

  - it: should include pod labels when provided
    set:
      api.podLabels:
        custom-label: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.labels["custom-label"]
          value: custom-value

  # ============================================================================
  # Image pull secrets tests
  # ============================================================================
  - it: should include imagePullSecrets when provided
    set:
      images.imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-registry-secret

  - it: should not include imagePullSecrets when not provided
    set:
      images.imagePullSecrets: []
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets

  # ============================================================================
  # Security context tests
  # ============================================================================
  - it: should apply pod security context
    set:
      api.podSecurityContext:
        runAsNonRoot: true
        fsGroup: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should apply container security context
    set:
      api.securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  # ============================================================================
  # Container environment variables tests
  # ============================================================================
  - it: should set ENABLE_GENAI_TRACES from values
    set:
      api.config.enable_genai_traces: "True"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENABLE_GENAI_TRACES
            value: "True"

  - it: should set SSL_VERIFY from values
    set:
      api.config.sslVerify: "False"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SSL_VERIFY
            value: "False"

  - it: should set LOG_LEVEL from values
    set:
      api.config.log_level: DEBUG
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: "DEBUG"

  - it: should set NUM_WORKERS from values
    set:
      api.config.num_workers: 8
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NUM_WORKERS
            value: "8"

  - it: should set ENABLE_DEV_MODE from values
    set:
      api.config.enable_dev_mode: "True"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENABLE_DEV_MODE
            value: "True"

  - it: should set HIDE_LLM_SECRETS from values
    set:
      api.config.hide_llm_secrets: "True"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HIDE_LLM_SECRETS
            value: "True"

  - it: should set HIDE_DESTINATION_SECRETS from values
    set:
      api.config.hide_destination_secrets: "True"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HIDE_DESTINATION_SECRETS
            value: "True"

  # ============================================================================
  # Azure settings tests
  # ============================================================================
  - it: should set AZURE_OPENAI_DEFAULT_API_VERSION when provided
    set:
      api.config.azure_settings.openAI.default_api_version: "2024-10-21"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_OPENAI_DEFAULT_API_VERSION
            value: "2024-10-21"

  - it: should set azure identity env vars when enabled
    set:
      api.config.azure_settings.azure_identity.enabled: true
      api.config.azure_settings.azure_identity.scope: "https://cognitiveservices.azure.com/.default"
      api.config.azure_settings.azure_identity.token_keyword: "AZURE_IDENTITY"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_IDENTITY_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_IDENTITY_SCOPE
            value: "https://cognitiveservices.azure.com/.default"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_IDENTITY_TOKEN_KEYWORD
            value: "AZURE_IDENTITY"

  - it: should not set azure identity env vars when disabled
    set:
      api.config.azure_settings.azure_identity.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_IDENTITY_ENABLED
          any: true

  # ============================================================================
  # AWS/PostgreSQL cert secret tests
  # Note: These tests are skipped as the schema doesn't allow postgreSQLCertSecret/awsCertSecret
  # The conditionals in deployment.yaml handle these values if provided via extraValues
  # ============================================================================

  # ============================================================================
  # Container ports tests
  # ============================================================================
  - it: should expose http port on 8765
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8765
            protocol: TCP

  - it: should expose noauth-http port on 8766
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: noauth-http
            containerPort: 8766
            protocol: TCP

  # ============================================================================
  # Resources tests
  # ============================================================================
  - it: should apply resource limits and requests
    set:
      api.resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: "1"
          memory: 2Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "2"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "1"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 2Gi

  # ============================================================================
  # Volume mounts tests
  # ============================================================================
  - it: should include all required volume mounts
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /tmp
            name: temp-storage
          any: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-volume
            mountPath: "/mnt/config/api"
          any: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: "/mnt/data"
            readOnly: false
          any: true

  - it: should include custom volumeMounts when provided
    set:
      api.volumeMounts:
        - name: custom-volume
          mountPath: /custom
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-volume
            mountPath: /custom

  # ============================================================================
  # Volumes tests
  # ============================================================================
  - it: should include all required volumes
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: temp-storage
            emptyDir: {}
          any: true

  - it: should include custom volumes when provided
    set:
      api.volumes:
        - name: custom-volume
          emptyDir: {}
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-volume
            emptyDir: {}

  # ============================================================================
  # Node selector tests
  # ============================================================================
  - it: should apply nodeSelector when provided
    set:
      api.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should not include nodeSelector when not provided
    set:
      api.nodeSelector: {}
    asserts:
      - isNull:
          path: spec.template.spec.nodeSelector

  # ============================================================================
  # Affinity tests
  # ============================================================================
  - it: should apply affinity when provided
    set:
      api.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - us-east-1a
    asserts:
      - exists:
          path: spec.template.spec.affinity.nodeAffinity

  # ============================================================================
  # Tolerations tests
  # ============================================================================
  - it: should apply tolerations when provided
    set:
      api.tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "api"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "api"
            effect: "NoSchedule"

  # ============================================================================
  # GPG public key volume and volumeMount tests
  # ============================================================================
  - it: should include gpg-public-key-volume volumeMount in api container
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: gpg-public-key-volume
            mountPath: "/mnt/config/gpg-public-key"
            readOnly: true
          any: true

  - it: should mount gpg-public-key-volume as readOnly
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: gpg-public-key-volume
            mountPath: "/mnt/config/gpg-public-key"
            readOnly: true
          any: true

  - it: should include gpg-public-key-volume backed by a configmap
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: gpg-public-key-volume
            configMap:
              name: retrieval-agent-manager-gpg-public-key
          any: true

  - it: should name the gpg-public-key configmap using the gpg.fullname helper
    release:
      name: my-release
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: gpg-public-key-volume
            configMap:
              name: retrieval-agent-manager-gpg-public-key
          any: true
