suite: Keycloak Deployment tests
templates:
  - templates/iam/keycloak/deployment.yaml
values:
  - ../values.yaml

tests:
  # ============================================================================
  # Basic deployment structure tests
  # ============================================================================
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: should have correct name
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-keycloak$"

  # ============================================================================
  # Replica count tests
  # ============================================================================
  - it: should set replicas when autoscaling is disabled
    set:
      iam.keycloak.autoscaling.enabled: false
      iam.keycloak.replicaCount: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should not set replicas when autoscaling is enabled
    set:
      iam.keycloak.autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  # ============================================================================
  # Deployment strategy tests - strategy is applied via values if supported
  # ============================================================================

  # ============================================================================
  # Pod annotations and labels tests
  # ============================================================================
  - it: should include pod annotations when provided
    set:
      iam.keycloak.podAnnotations:
        custom-annotation: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: custom-value

  - it: should include pod labels when provided
    set:
      iam.keycloak.podLabels:
        custom-label: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.labels["custom-label"]
          value: custom-value

  # ============================================================================
  # Image pull secrets tests
  # ============================================================================
  - it: should include imagePullSecrets when provided
    set:
      images.imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-registry-secret

  # ============================================================================
  # Security context tests
  # ============================================================================
  - it: should apply pod security context
    set:
      iam.keycloak.podSecurityContext:
        runAsNonRoot: true
        fsGroup: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  # ============================================================================
  # Init containers tests
  # ============================================================================
  - it: should have check-db-ready init container
    asserts:
      - exists:
          path: spec.template.spec.initContainers
      - matchRegex:
          path: spec.template.spec.initContainers[0].name
          pattern: "check-db-ready"

  - it: should have copy-keycloak-theme init container
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].name
          pattern: "copy-keycloak-theme"

  - it: should have keycloak-build init container
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[2].name
          pattern: "keycloak-build"

  # ============================================================================
  # Resources tests
  # ============================================================================
  - it: should apply resource limits and requests
    set:
      iam.keycloak.resources:
        limits:
          cpu: "2"
          memory: 2Gi
        requests:
          cpu: "1"
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].resources.limits.cpu
          value: "2"
      - equal:
          path: spec.template.spec.initContainers[0].resources.limits.memory
          value: 2Gi

  # ============================================================================
  # Labels tests
  # ============================================================================
  - it: should include standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should include keycloak component label
    asserts:
      - matchRegex:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          pattern: "keycloak"
