suite: _lib/_helpers.tpl tests
templates:
  - templates/api/deployment.yaml
values:
  - ../values.yaml
tests:
  # ============================================================================
  # retrieval-agent-manager.name tests (tested via api.name which appends -api)
  # ============================================================================
  - it: should use default chart name when nameOverride is not set
    asserts:
      - matchRegex:
          path: metadata.labels["app.kubernetes.io/name"]
          pattern: "sas-retrieval-agent-manager-api"

  # Note: nameOverride tests removed - property not in schema
  # The name is controlled by .Values.name (which is in schema)

  # ============================================================================
  # retrieval-agent-manager.fullname tests
  # ============================================================================
  - it: should use .Values.name when set
    set:
      name: my-custom-name
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^my-custom-name"

  - it: should use release name when it contains chart name
    release:
      name: retrieval-agent-manager-release
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "retrieval-agent-manager"

  # ============================================================================
  # retrieval-agent-manager.chart tests
  # ============================================================================
  - it: should include chart name and version in helm.sh/chart label
    asserts:
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: "^sas-retrieval-agent-manager-[0-9]+\\.[0-9]+\\.[0-9]+"

  # ============================================================================
  # retrieval-agent-manager.labels tests
  # ============================================================================
  - it: should include all standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  # Note: connection-validation label is in retrieval-agent-manager.labels but not in api.labels
  # This is by design - api uses its own api.labels template

  # ============================================================================
  # retrieval-agent-manager.selectorLabels tests
  # ============================================================================
  - it: should include selector labels in deployment spec
    asserts:
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
